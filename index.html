/* ══ SYSTEM SUBSCRIPTION MODULE ════════════════════════════════════════════ */
function Subscribe(){
  const amberMid="#e1af53", charcoalBg="#111827", cardBorder="rgba(225,175,83,0.15)";
  const [done,setDone]=React.useState(false);
  const [path,setPath]=React.useState('');
  async function submit(e){
    e.preventDefault();
    const email=e.target.email.value.trim();
    const name=e.target.name.value.trim();
    if(!email||!email.includes('@'))return;
    const data=new URLSearchParams();
    data.append('form-name','helixra-subscribe');
    data.append('name',name);data.append('email',email);data.append('path',path);
    try{await fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:data.toString()});}catch(_){}
    setDone(true);
  }
  return(
    <div style={{background:charcoalBg,borderRadius:24,padding:"4rem 3rem",
      textAlign:"center",border:`1px solid ${cardBorder}`,boxShadow:"0 20px 40px rgba(0,0,0,0.3)"}}>
      <span style={{fontFamily:"monospace",fontSize:"0.65rem",letterSpacing:"0.25em",
        textTransform:"uppercase",color:amberMid,opacity:0.6,display:"block",marginBottom:12}}>
        STAY LINKED WITH THE ARCHIVE
      </span>
      <h2 style={{fontSize:"clamp(2rem,4vw,2.8rem)",color:"#ffffff",marginBottom:12,marginTop:0}}>Sow Your Seed.</h2>
      <p style={{color:"#94a3b8",maxWidth:540,margin:"0 auto 32px",lineHeight:1.6,fontSize:"0.95rem"}}>
        Quarterly diagnostic dispatches: raw engineering logs, ethnographic files, methodology verification. Minimal footprint.
      </p>
      {done?(
        <div style={{color:amberMid,fontSize:"1.1rem",fontWeight:500,padding:"1rem"}}>
          🌱 Matrix link initialized. We'll synchronize when the next deployment ships.
        </div>
      ):(
        <form onSubmit={submit} style={{maxWidth:600,margin:"0 auto"}}>
          <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
            <input name="name" type="text" placeholder="Identity name"
              style={{background:"#0b0f19",border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:8,padding:"0.85rem 1.2rem",color:"#ffffff",
                fontSize:"0.85rem",outline:"none",flex:1,minWidth:180}}/>
            <input name="email" type="email" placeholder="secure@network.com" required
              style={{background:"#0b0f19",border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:8,padding:"0.85rem 1.2rem",color:"#ffffff",
                fontSize:"0.85rem",outline:"none",flex:1.5,minWidth:220}}/>
          </div>
          <div style={{marginBottom:28,textAlign:"left"}}>
            <p style={{fontFamily:"monospace",fontSize:"0.6rem",letterSpacing:"0.15em",
              textTransform:"uppercase",color:"#94a3b8",marginBottom:12,textAlign:"center"}}>Select Architectural Path (Optional)</p>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              {["🌿 Nature","⚑ Ritual","〜 Movement","◆ Strategy"].map(p=>(
                <button key={p} type="button" onClick={()=>setPath(p)}
                  style={{background:path===p?"rgba(225,175,83,0.15)":"#0b0f19",
                    border:`1px solid ${path===p?amberMid:"rgba(255,255,255,0.1)"}`,
                    color:path===p?"#ffffff":amberMid,borderRadius:6,padding:"0.5rem 1.2rem",
                    fontFamily:"monospace",fontSize:"0.72rem",cursor:"pointer"}}>
                  {p}
                </button>
              ))}
            </div>
          </div>
          <button type="submit"
            style={{background:amberMid,color:"#0b0f19",border:"none",
              padding:"1rem 3rem",borderRadius:8,fontFamily:"monospace",
              fontWeight:700,fontSize:"0.8rem",letterSpacing:"0.1em",
              textTransform:"uppercase",cursor:"pointer",boxShadow:"0 4px 14px rgba(225,175,83,0.2)"}}>
            Initialize Node Registration →
          </button>
        </form>
      )}
    </div>
  );
}
