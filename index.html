*{box-sizing:border-box}
body{margin:0;font-family:"Lora",Georgia,serif;}
h1,h2,h3,h4{font-family:"Abril Fatface",serif!important}

@keyframes floatSeed{
  0%  {transform:rotate(28deg) translateY(0);}
  50% {transform:rotate(24deg) translateY(-5px);}
  100%{transform:rotate(28deg) translateY(0);}
}
@keyframes ticker{
  0%  {transform:translateX(0);}
  100%{transform:translateX(-50%);}
}
.ticker-inner{animation:ticker 34s linear infinite;display:inline-block;white-space:nowrap;}

/* ── 3-col layout: [left | seed spine | right] ── */
.seed-pair{
  display:grid;
  grid-template-columns:1fr 70px 1fr;
  align-items:stretch;
  max-width:1100px;
  margin:0 auto;
  padding:0 2rem;
}
.fw{max-width:1100px;margin:0 auto;padding:4rem 2rem;}

/* responsive grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}

.sdg-mob{display:none;}
.sdg-orbit{display:block;}

@media(max-width:900px){
  .seed-pair{grid-template-columns:1fr!important;padding:0 1.2rem;}
  .spine-col{display:none!important;}
  .fw{padding:3rem 1.2rem;}
  .g2,.g3,.g4{grid-template-columns:1fr!important;}
  .nav-links-d{display:none!important;}
  .sdg-orbit{display:none!important;}
  .sdg-mob{display:flex!important;}
  .footer-g{grid-template-columns:1fr 1fr!important;}
}
@media(max-width:560px){
  .footer-g{grid-template-columns:1fr!important;}
  .hero-h{font-size:2.2rem!important;}
  .fw{padding:2.5rem 1rem;}
}

/* scroll reveal */
.sr{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease;}
.sr.vis{opacity:1;transform:none;}

/* ══ SUBSCRIBE (Netlify) ════════════════════════════════════════════════════ */
function Subscribe(){
  const amber="#c8862e",amberMid="#e1af53",maroon="#2b1205";
  const [done,setDone]=React.useState(false);
  const [path,setPath]=React.useState('');
  async function submit(e){
    e.preventDefault();
    const email=e.target.email.value.trim();
    const name=e.target.name.value.trim();
    if(!email||!email.includes('@'))return;
    const data=new URLSearchParams();
    data.append('form-name','helixra-subscribe');
    data.append('name',name);data.append('email',email);data.append('path',path);
    try{await fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:data.toString()});}catch(_){}
    setDone(true);
  }
  return(
    <div style={{background:maroon,borderRadius:32,padding:"3rem 2.5rem",
      textAlign:"center",boxShadow:"0 12px 44px rgba(43,18,5,0.22)"}}>
      <span style={{fontFamily:"monospace",fontSize:"0.58rem",letterSpacing:"0.2em",
        textTransform:"uppercase",color:"rgba(225,175,83,0.48)",display:"block",marginBottom:9}}>
        Stay With the Archive
      </span>
      <h2 style={{fontFamily:"Abril Fatface,serif",fontSize:"clamp(1.9rem,3.5vw,2.7rem)",
        color:amberMid,marginBottom:9}}>Sow Your Seed.</h2>
      <p style={{color:"rgba(225,175,83,0.63)",fontStyle:"italic",marginBottom:24,fontSize:"0.9rem"}}>
        Quarterly notes: new chapters, specialist interviews, methodology updates. No noise.
      </p>
      {done?(
        <div style={{color:amberMid,fontSize:"1.1rem",fontStyle:"italic",padding:"1rem"}}>
          🌱 The seeds have been sown. We'll reach out when the next chapter is ready.
        </div>
      ):(
        <form onSubmit={submit}>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",justifyContent:"center"}}>
            <input name="name" type="text" placeholder="Your name..."
              style={{background:"rgba(225,175,83,0.07)",border:"1.5px solid rgba(225,175,83,0.2)",
                borderRadius:999,padding:"0.75rem 1.3rem",color:amberMid,fontFamily:"monospace",
                fontSize:"0.78rem",outline:"none",flex:1,minWidth:160}}/>
            <input name="email" type="email" placeholder="your@email.com" required
              style={{background:"rgba(225,175,83,0.07)",border:"1.5px solid rgba(225,175,83,0.2)",
                borderRadius:999,padding:"0.75rem 1.3rem",color:amberMid,fontFamily:"monospace",
                fontSize:"0.78rem",outline:"none",flex:1.6,minWidth:200}}/>
          </div>
          <div style={{marginBottom:16}}>
            <p style={{fontFamily:"monospace",fontSize:"0.58rem",letterSpacing:"0.15em",
              textTransform:"uppercase",color:"rgba(225,175,83,0.4)",marginBottom:8}}>Choose your path (optional)</p>
            <div style={{display:"flex",gap:7,justifyContent:"center",flexWrap:"wrap"}}>
              {["🌿 Nature","⚑ Ritual","〜 Movement","◆ Strategy"].map(p=>(
                <button key={p} type="button" onClick={()=>setPath(p)}
                  style={{background:path===p?"rgba(225,175,83,0.25)":"rgba(225,175,83,0.07)",
                    border:`1.5px solid ${path===p?"rgba(225,175,83,0.6)":"rgba(225,175,83,0.2)"}`,
                    color:amberMid,borderRadius:999,padding:"0.4rem 1rem",
                    fontFamily:"monospace",fontSize:"0.67rem",cursor:"pointer"}}>
                  {p}
                </button>
              ))}
            </div>
          </div>
          <button type="submit"
            style={{background:amberMid,color:maroon,border:"none",
              padding:"0.9rem 2.5rem",borderRadius:999,fontFamily:"monospace",
              fontWeight:900,fontSize:"0.75rem",letterSpacing:"0.08em",
              textTransform:"uppercase",cursor:"pointer"}}>
            Sow Your Seed →
          </button>
          <p style={{color:"rgba(225,175,83,0.3)",fontSize:"0.75rem",marginTop:10}}>
            No spam. Unsubscribe any time.
          </p>
        </form>
      )}
    </div>
  );
}

/* ══ APP ════════════════════════════════════════════════════════════════════ */

        <span style={{border:"1px solid rgba(43,18,5,0.2)",fontFamily:"monospace",fontSize:"0.54rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",padding:"0.17rem 0.45rem",borderRadius:4}}>{type}</span>
      </div>
      <h3 style={{fontFamily:"Abril Fatface,serif",fontSize:"1.9rem",margin:"0 0 3px"}}>{title}</h3>

      <div style={{background:"#f4d8a8",borderRadius:12,padding:11,marginBottom:12,boxShadow:"inset 0 2px 8px rgba(43,18,5,0.1)"}}>

          {Array.from({length:12}).map((_,j)=>(
            <div key={j} style={{aspectRatio:"1",borderRadius:"50%",
              background:j%4===0?"#cf2b2b":j%3===0?"#c8862e":"#fde8c0",

        <div><strong style={{textTransform:"uppercase",letterSpacing:"0.09em",display:"block",marginBottom:1}}>Region</strong>{region}</div>
        <div><strong style={{textTransform:"uppercase",letterSpacing:"0.09em",display:"block",marginBottom:1}}>Period</strong>{period}</div>
        <div style={{gridColumn:"1/-1"}}><strong style={{textTransform:"uppercase",letterSpacing:"0.09em",display:"block",marginBottom:1}}>Source</strong>{source}</div>
      </div>
      {live&&(
        <a href="./play/" style={{display:"inline-block",background:maroon,color:amberMid,borderRadius:999,
          padding:"0.65rem 1.6rem",fontFamily:"monospace",fontWeight:900,fontSize:"0.7rem",
          textDecoration:"none",boxShadow:"0 4px 14px rgba(43,18,5,0.2)"}}>
          Play Now →
        </a>
      )}

  );

  return(
    <div style={{minHeight:"100vh",
      background:`linear-gradient(180deg,${amber} 0%,${amberMid} 30%,#e8be60 55%,${amberMid} 78%,${amber} 100%)`,

      <style>{`@keyframes floatSeed{0%{transform:rotate(28deg) translateY(0);}50%{transform:rotate(24deg) translateY(-5px);}100%{transform:rotate(28deg) translateY(0);}}`}</style>

      {/* ── NAV ────────────────────────────────────────────────────────── */}
      <nav id="nav" style={{position:"fixed",top:0,left:0,right:0,zIndex:300,
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0.7rem 2.5rem",
        background:"rgba(200,134,46,0.94)",backdropFilter:"blur(16px)",
        borderBottom:"1.5px solid rgba(43,18,5,0.12)"}}>
        <a href="/" style={{display:"flex",alignItems:"center",gap:10,textDecoration:"none"}}>
          <img src="./assets/img/helixra-logo.png" alt="Helixra"
            style={{height:33,width:"auto",objectFit:"contain"}}
            onError={e=>{e.target.style.display="none";}}/>
          <span style={{fontFamily:"Abril Fatface,serif",fontSize:"1.3rem",color:maroon}}>
            Helixra<sup style={{fontFamily:"monospace",fontSize:"0.5rem",opacity:0.55}}>™</sup>
